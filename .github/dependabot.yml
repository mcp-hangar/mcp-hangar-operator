# Dependabot version-updates (security updates run separately). Grouped
# minor+patch so routine bumps arrive as one reviewable PR; majors come
# individually. Conventional titles satisfy the reusable pr-title validator.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Kubernetes libraries move in lockstep, and their "minor" (0.x) bumps carry
      # breaking API changes (e.g. the controller-runtime v0.24 migration -- see
      # #43/#58). Keep them in a dedicated group so they arrive as one deliberate,
      # reviewed PR rather than folded into the routine minor-patch batch.
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
        update-types:
          - "minor"
          - "patch"
      go-minor-patch:
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
