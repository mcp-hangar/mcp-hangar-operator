name: Bug Report
description: Report a bug or unexpected behavior.
title: "[BUG] "
labels: ["type/bug", "status/triage"]
body:
  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: One-line description of the bug
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Run ... 2. Send ... 3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 0.1.0 or git sha"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Kubernetes version, Go version, controller-runtime version, etc."
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - p0-critical
        - p1-high
        - p2-normal
        - p3-low
      default: 2
    validations:
      required: true
