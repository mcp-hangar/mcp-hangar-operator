name: Feature Request
description: Propose a new feature or enhancement.
title: "[FEAT] "
labels: ["type/feature", "priority/p2-normal"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the desired behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you evaluated
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - Criterion 1
        - Criterion 2
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - api
        - controller
        - webhook
        - health
        - config
        - ci
        - docs
        - deps
        - infra
        - tests
        - other
    validations:
      required: true
