# Cuts a release when a semver tag (vX.Y.Z) is pushed: builds the multi-arch
# manager image to GHCR and attaches the rendered install manifest to a GitHub
# Release. Manual release = push a tag. See ADR-009 (independent release
# topology, mcp-hangar/mcp-hangar#410).
name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR
  id-token: write   # keyless cosign signing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/mcp-hangar/mcp-hangar-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true   # SLSA provenance attestation
          sbom: true         # SBOM attestation
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/mcp-hangar/mcp-hangar-operator@${DIGEST}"

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install crane
        run: go install github.com/google/go-containerregistry/cmd/crane@v0.20.2

      # `provenance: true` / `sbom: true` above make buildx attach an SPDX
      # SBOM and an SLSA provenance (v1) in-toto statement to the pushed index,
      # but as plain, unsigned OCI referrers -- readable but not independently
      # verifiable: `cosign verify-attestation` finds "no matching attestations"
      # for them even though the image signature verifies fine (see #31). Pull
      # those predicate bodies straight from the registry and re-attest them as
      # cosign DSSE envelopes keyed to the same digest the image signature
      # covers, so they verify the same way.
      #
      # We read the predicates from the attestation manifests directly (crane)
      # rather than `docker buildx imagetools inspect --format`: for a
      # multi-arch image `.Provenance` is a *platform-keyed map*, so the old
      # `has("SLSA")` unwrap fell through and attested a map with neither a
      # v0.2 `builder` nor a v1 `buildDefinition` -- the v0.13.0 release
      # failures. Crane extraction is deterministic across buildx versions.
      - name: Sign and attest the SBOM + provenance (keyless)
        env:
          REF: ghcr.io/mcp-hangar/mcp-hangar-operator@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          CRANE="$(go env GOPATH)/bin/crane"
          base="${REF%@*}"

          # Extract the .predicate of the in-toto statement whose layer carries
          # the given predicate-type, from any of the image's attestation
          # manifests. Fails loudly rather than attesting empty content.
          extract() {
            ptype="$1"; out="$2"
            for att in $("$CRANE" manifest "$REF" \
              | jq -r '.manifests[] | select(.annotations["vnd.docker.reference.type"]=="attestation-manifest") | .digest'); do
              blob=$("$CRANE" manifest "${base}@${att}" \
                | jq -r --arg t "$ptype" '.layers[] | select(.annotations["in-toto.io/predicate-type"]==$t) | .digest' | head -1)
              if [ -n "$blob" ]; then
                "$CRANE" blob "${base}@${blob}" | jq '.predicate' > "$out"
                if [ -s "$out" ] && [ "$(cat "$out")" != "null" ]; then return 0; fi
              fi
            done
            echo "::error::no ${ptype} predicate found for ${REF}"
            exit 1
          }

          extract "https://spdx.dev/Document"        sbom.spdx.json
          extract "https://slsa.dev/provenance/v1"   provenance.json

          cosign attest --yes --predicate sbom.spdx.json --type spdxjson       "$REF"
          cosign attest --yes --predicate provenance.json --type slsaprovenance1 "$REF"

      - name: Render install manifest
        run: |
          set -euo pipefail
          make manifests kustomize
          IMG=ghcr.io/mcp-hangar/mcp-hangar-operator:${{ steps.v.outputs.version }}
          (cd config/manager && "$GITHUB_WORKSPACE/bin/kustomize" edit set image controller="$IMG")
          ./bin/kustomize build config/default > install.yaml

      - uses: softprops/action-gh-release@v3
        with:
          files: install.yaml
          generate_release_notes: true
