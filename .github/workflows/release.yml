# Cuts a release when a semver tag (vX.Y.Z) is pushed: builds the multi-arch
# manager image to GHCR and attaches the rendered install manifest to a GitHub
# Release. Manual release = push a tag. See ADR-009 (independent release
# topology, mcp-hangar/mcp-hangar#410).
name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR
  id-token: write   # keyless cosign signing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/mcp-hangar/mcp-hangar-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true   # SLSA provenance attestation
          sbom: true         # SBOM attestation
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/mcp-hangar/mcp-hangar-operator@${DIGEST}"

      # `provenance: true` / `sbom: true` above make buildx attach an SPDX
      # SBOM and an SLSA provenance in-toto statement to the pushed index,
      # but as plain, unsigned OCI referrers -- readable via `imagetools
      # inspect` / `cosign download attestation`, but not independently
      # verifiable: `cosign verify-attestation` finds "no matching
      # attestations" for them even though the image signature itself
      # verifies fine (see #31). Pull that same buildx-generated content
      # back out and re-attest it as a cosign DSSE envelope, keyed to the
      # same digest the image signature above covers, so it verifies the
      # same way.
      - name: Sign and attest the SBOM + provenance (keyless)
        env:
          REF: ghcr.io/mcp-hangar/mcp-hangar-operator@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          # Extract a buildx-attached predicate and unwrap it if buildx
          # nested it under a top-level key (observed: "SPDX"/"SLSA");
          # otherwise pass the document through as-is. Fails loudly rather
          # than attesting empty/garbage content if the shape ever changes.
          extract_predicate() {
            field="$1"; wrapper="$2"; out="$3"
            docker buildx imagetools inspect "$REF" --format "{{ json .${field} }}" \
              | jq --arg w "$wrapper" 'if type == "object" and has($w) then .[$w] else . end' \
              > "$out"
            if [ ! -s "$out" ] || [ "$(cat "$out")" = "null" ]; then
              echo "::error::failed to extract ${field} predicate from buildx metadata for ${REF}"
              exit 1
            fi
          }

          extract_predicate SBOM SPDX sbom.spdx.json
          extract_predicate Provenance SLSA provenance.json

          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$REF"
          cosign attest --yes --predicate provenance.json --type slsaprovenance "$REF"

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Render install manifest
        run: |
          set -euo pipefail
          make manifests kustomize
          IMG=ghcr.io/mcp-hangar/mcp-hangar-operator:${{ steps.v.outputs.version }}
          (cd config/manager && "$GITHUB_WORKSPACE/bin/kustomize" edit set image controller="$IMG")
          ./bin/kustomize build config/default > install.yaml

      - uses: softprops/action-gh-release@v2
        with:
          files: install.yaml
          generate_release_notes: true
