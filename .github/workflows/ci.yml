# Go CI gate: build, vet, race-tested (via setup-envtest) and lint. Runs on
# every PR into main and on pushes to main. See issue #14.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (a new push to a PR/branch supersedes
# the in-flight run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Run tests (race)
        run: |
          set -euo pipefail
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.29.0 -p path)"
          export KUBEBUILDER_ASSETS
          go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint v2: v1.64.8 could not typecheck the go 1.26 toolchain
          # the k8s v0.36 / controller-runtime v0.24 bump requires. Action v8 is
          # the v2-compatible major (v6 is v1-only); .golangci.yml is v2 format.
          version: v2.12.2
