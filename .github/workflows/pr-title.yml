# Enforces Conventional Commits per GIT_FLOW.md decision #1 and CC scope reference.
name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
            security
          scopes: |
            api
            ci
            config
            controller
            deps
            docs
            health
            infra
            tests
            webhook
            repo
          requireScope: true
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: "Subject must start lowercase and not end with a period."
          # No custom headerPattern: the action's built-in conventional-commits
          # parser handles `type(scope)!: subject` correctly. A previous custom
          # pattern was unquoted YAML containing ": " -> the workflow failed to
          # compile, so pr-title never ran on pull_request (required check missing).
          validateSingleCommit: false

      - name: Reject emoji in title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$TITLE" | grep -qP '[\x{1F300}-\x{1F9FF}]|[\x{2600}-\x{26FF}]|[\x{2700}-\x{27BF}]'; then
            echo "::error::PR title contains emoji. See GIT_FLOW.md."
            exit 1
          fi
