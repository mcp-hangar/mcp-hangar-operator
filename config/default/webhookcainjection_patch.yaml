# This patch adds the cert-manager CA-injection annotation to the
# ValidatingWebhookConfiguration so cert-manager injects the serving CA bundle
# into its clientConfig. The CERTIFICATE_NAMESPACE/CERTIFICATE_NAME placeholders
# are substituted by the kustomize replacements in kustomization.yaml.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: CERTIFICATE_NAMESPACE/CERTIFICATE_NAME
