# This kustomization.yaml is not intended to be run by itself,
# since it depends on service name and namespace that are out of this kustomize package.
# It should be run by config/default
resources:
- bases/mcp-hangar.io_mcpservers.yaml
- bases/mcp-hangar.io_mcpservergroups.yaml
- bases/mcp-hangar.io_mcpdiscoverysources.yaml
- bases/mcp-hangar.io_mcpegresspolicies.yaml
# +kubebuilder:scaffold:crdkustomizeresource

patches:
# [WEBHOOK] To enable the conversion webhook, uncomment the following patches.
# They add spec.conversion.strategy=Webhook + clientConfig so the apiserver
# routes v1alpha1<->v1alpha2 conversion through the operator's /convert handler.
# The CA is injected by cert-manager via the cainjection patches below.
- path: patches/webhook_in_mcpservers.yaml
- path: patches/webhook_in_mcpservergroups.yaml
- path: patches/webhook_in_mcpdiscoverysources.yaml
# +kubebuilder:scaffold:crdkustomizewebhookpatch

# [CERTMANAGER] To enable cert-manager, uncomment the following patches.
- path: patches/cainjection_in_mcpservers.yaml
- path: patches/cainjection_in_mcpservergroups.yaml
- path: patches/cainjection_in_mcpdiscoverysources.yaml
# +kubebuilder:scaffold:crdkustomizecainjectionpatch

# [WEBHOOK] To enable the conversion webhook, uncomment the following configuration
# so kustomize substitutes the webhook service name/namespace nameReference.
configurations:
- kustomizeconfig.yaml
