                              type: string
                            host:
                              description: Host is a hostname or glob pattern (e.g.
                                "api.example.com" or "*.internal.corp")
                              minLength: 1
                              type: string
                            port:
                              default: 443
                              description: Port is the TCP port (0 = any port)
                              format: int32
                              maximum: 65535
                              minimum: 0
                              type: integer
                            protocol:
                              default: https
                              description: Protocol is the application protocol hint
                              enum:
                              - https
                              - http
                              - grpc
                              - tcp
                              - any
                              type: string
                          required:
                          - host
                          type: object
                        type: array
                      loopbackAllowed:
                        description: LoopbackAllowed controls whether localhost connections
                          are permitted
                        type: boolean
                    type: object
                  resources:
                    description: Resources defines resource consumption expectations
                      (soft limits for behavioral profiling)
                    properties:
