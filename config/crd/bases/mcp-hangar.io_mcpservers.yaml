                - type
                x-kubernetes-list-type: map
              consecutiveFailures:
                description: ConsecutiveFailures counts consecutive health failures
                format: int32
                type: integer
              endpoint:
                description: Endpoint is the internal endpoint URL
                type: string
              lastHealthCheck:
                description: LastHealthCheck is the last successful health check
                format: date-time
                type: string
              lastStartedAt:
                description: LastStartedAt is the last startup time
                format: date-time
                type: string
              lastStoppedAt:
                description: LastStoppedAt is the last shutdown time
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation observed by controller
                format: int64
                type: integer
              phase:
                description: Phase is the overall phase
                type: string
              podName:
                description: PodName is the name of the managed Pod
                type: string
              readyReplicas:
                description: ReadyReplicas is the number of ready replicas
                format: int32
                type: integer
              replicas:
                description: Replicas is the desired replicas
                format: int32
                type: integer
              state:
                description: State is the current provider state
