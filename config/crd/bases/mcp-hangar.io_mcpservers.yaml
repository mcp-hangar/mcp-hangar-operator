                        type: array
                      required:
                        description: Required lists environment variables the provider
                          must have
                        items:
                          type: string
                        type: array
                    type: object
                  filesystem:
                    description: Filesystem defines allowed filesystem access
                    properties:
                      readPaths:
                        description: ReadPaths lists allowed read-only mount paths
                        items:
                          type: string
                        type: array
                      tempAllowed:
                        default: true
                        description: TempAllowed controls whether /tmp writes are
