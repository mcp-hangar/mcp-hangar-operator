                      writePaths:
                        description: WritePaths lists allowed read-write mount paths
                        items:
                          type: string
                        type: array
                    type: object
                  network:
                    description: Network defines allowed network access
                    properties:
                      dnsAllowed:
                        default: true
                        description: DNSAllowed controls whether DNS queries are permitted
                        type: boolean
                      egress:
                        description: Egress is the list of allowed outbound destinations
