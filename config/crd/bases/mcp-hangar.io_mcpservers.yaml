                - Cold
                - Initializing
                - Ready
                - Degraded
                - Dead
                type: string
              tools:
                description: Tools is the list of tool names
                items:
                  type: string
                type: array
              toolsCount:
                description: ToolsCount is the number of exposed tools
                format: int32
                type: integer
              violations:
                description: Violations records detected capability violations (most
                  recent MaxViolationRecords entries)
                items:
                  description: |-
                    ViolationRecord represents a detected capability violation.
                    Stored in MCPServerStatus.Violations for audit and visibility via kubectl.
                  properties:
                    action:
                      description: 'Action is the enforcement action taken: alert,
                        block, quarantine'
                      enum:
                      - alert
                      - block
                      - quarantine
                      type: string
                    destination:
                      description: Destination is the network destination (for egress
                        violations)
                      type: string
                    detail:
                      description: Detail is a human-readable description of the violation
                      type: string
                    severity:
                      description: 'Severity: critical, high, medium, low'
                      enum:
                      - critical
                      - high
                      - medium
                      - low
                      type: string
                    timestamp:
                      description: Timestamp is when the violation was detected
                      format: date-time
                      type: string
                    type:
                      description: 'Type of violation: egress_denied, capability_drift,
                        undeclared_tool, schema_mismatch, quarantine_triggered'
                      enum:
                      - egress_denied
                      - capability_drift
                      - undeclared_tool
                      - schema_mismatch
                      - quarantine_triggered
                      type: string
                  required:
                  - action
                  - severity
                  - timestamp
                  - type
                  type: object
                type: array
            type: object
        type: object
