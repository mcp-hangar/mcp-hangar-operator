                      - host
                      type: object
                    name:
                      description: Name identifies the rule (unique within the policy).
                      maxLength: 253
                      minLength: 1
                      type: string
                    tools:
                      description: Tools constrains which tool calls may reach this
                        upstream.
                      properties:
                        allow:
                          description: Allow lists tool-name globs permitted to this
                            upstream.
                          items:
                            type: string
                          maxItems: 128
                          type: array
                        deny:
                          description: Deny lists tool-name globs rejected outright.
                          items:
                            type: string
                          maxItems: 128
                          type: array
                        requireApproval:
                          description: RequireApproval lists tool-name globs that
                            route into approval gates.
                          items:
                            type: string
                          maxItems: 128
                          type: array
