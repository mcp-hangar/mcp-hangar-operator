                - kind
                - name
                type: object
              upstreams:
                description: |-
                  Upstreams is the allow-list. With DefaultAction=Deny (the default), an
                  empty list denies all egress except the always-permitted DNS/Hangar
                  backstop paths.
                items:
                  description: UpstreamRule is one entry in the deny-by-default allow-list.
                  properties:
                    arguments:
                      description: Arguments constrains tool-call arguments to this
                        upstream.
                      properties:
                        deny:
                          description: Deny rejects tool calls whose arguments match
                            the given constraints.
                          properties:
                            maxPayloadBytes:
                              description: MaxPayloadBytes rejects tool-call argument
                                payloads larger than this.
                              format: int64
                              minimum: 0
                              type: integer
                            secretPatterns:
                              description: |-
                                SecretPatterns names deterministic secret-detection patterns to reject
                                (e.g. aws-keys, pem-blocks, jwt).
                              items:
                                type: string
                              maxItems: 64
                              type: array
                          type: object
                      type: object
                    match:
                      description: Match selects the upstream and its trust conditions.
                      properties:
                        host:
                          description: Host is the upstream hostname (FQDN) this rule
                            matches.
                          maxLength: 253
                          minLength: 1
                          type: string
                        imageDigest:
                          description: |-
                            ImageDigest controls how the target's container image pin gates this
                            upstream: "required" demands a pinned image, "inherited" defers to the
                            operator-wide image-digest policy.
                          enum:
                          - required
                          - inherited
                          type: string
                        issuers:
                          description: Issuers restricts which token issuers may be
                            brokered to this upstream.
                          items:
                            type: string
                          maxItems: 32
                          type: array
                        toolSchemaDigestRef:
