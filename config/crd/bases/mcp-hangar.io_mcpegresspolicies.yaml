        description: MCPEgressPolicy is the Schema for the mcpegresspolicies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MCPEgressPolicySpec is the desired egress policy.
            properties:
              defaultAction:
                default: Deny
                description: DefaultAction is applied to traffic not matched by any
                  upstream rule.
                enum:
                - Deny
                - Allow
                type: string
              mode:
                default: Audit
                description: |-
                  Mode controls whether violations are only observed (Audit) or blocked
                  (Enforce).
                enum:
                - Audit
                - Enforce
                type: string
              networkBackstop:
                description: |-
                  NetworkBackstop controls the generated L3/L4 backstop. Defaults to
                  generating an auto-detected backstop when omitted.
                properties:
                  flavor:
                    default: Auto
                    description: Flavor selects the backstop implementation.
                    enum:
                    - Auto
                    - Cilium
                    - Vanilla
                    type: string
                  generate:
                    default: true
                    description: Generate emits the network backstop alongside the
                      compiled policy.
                    type: boolean
