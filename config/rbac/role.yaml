---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - namespaces
  - secrets
  - serviceaccounts
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mcp-hangar.io
  resources:
  - mcpdiscoverysources
  - mcpprovidergroups
  - mcpproviders
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mcp-hangar.io
  resources:
  - mcpdiscoverysources/finalizers
  - mcpprovidergroups/finalizers
  - mcpproviders/finalizers
  verbs:
  - update
- apiGroups:
  - mcp-hangar.io
  resources:
  - mcpdiscoverysources/status
  - mcpprovidergroups/status
  - mcpproviders/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
