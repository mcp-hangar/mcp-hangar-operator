version: "2"
# golangci-lint v2 config. Goal (unchanged from the v1 gate): a conservative,
# PASSING quality gate on the existing code -- not a cleanup sweep. If a check
# is noisy on pre-existing code, scope it here (with a note) rather than churning
# the Go source. staticcheck is limited to the SA* bug analyses to match the v1
# gate's scope; v2 otherwise folds the ST/S/QF *style* checks into `staticcheck`,
# which this gate deliberately does not run.
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck      # unchecked errors
    - govet         # go vet
    - staticcheck   # SA* analyses only (see settings)
    - ineffassign   # ineffectual assignments
    - unused        # unused code
    - misspell      # common spelling mistakes in comments/strings
  settings:
    staticcheck:
      checks:
        - "SA*"      # bug-finding analyses only -- matches the pre-v2 gate scope
        - "-SA1019"  # deprecations: controller-runtime v0.24 deprecated
                     # CustomValidator (-> Validator) and GetEventRecorderFor
                     # (-> GetEventRecorder). Both still work; migrate off them in
                     # a scheduled follow-up rather than in this dependency bump.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
          - unused
        path: zz_generated\.deepcopy\.go
      - linters:
          - errcheck
          - unused
        path: _test\.go
      - linters:
          - ineffassign
        path: internal/controller/mcpdiscoverysource_controller\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
